<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="header" class="navbar">
  <div class="navbar-inner">

    <!-- Brand -->
    <a th:href="@{/}" class="navbar-brand">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7.5 10.5a3.75 3.75 0 0 0 5.303.053l2.25-2.25a3.75 3.75 0 0 0-5.303-5.303L8.5 4.25" stroke="#388bfd" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10.5 7.5a3.75 3.75 0 0 0-5.303-.053l-2.25 2.25a3.75 3.75 0 0 0 5.303 5.303L9.5 13.75" stroke="#388bfd" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Fewster<span class="brand-dot"></span>
    </a>

    <!-- Nav items -->
    <div class="navbar-nav">

      <!-- Unauthenticated -->
      <div sec:authorize="isAnonymous()">
        <a th:href="@{/login}"    class="btn btn-ghost btn-sm"><span>Sign in</span></a>
        <a th:href="@{/register}" class="btn btn-primary btn-sm"><span>Get started</span></a>
      </div>

      <!-- Authenticated -->
      <div sec:authorize="isAuthenticated()" style="display:flex;align-items:center;gap:.5rem;">
        <span class="navbar-user">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="opacity:.6">
            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm-5 6s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3z"/>
          </svg>
          <span sec:authentication="name">user</span>
        </span>

        <a th:href="@{/dashboard}" class="btn btn-ghost btn-sm">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
            <path d="M1 2a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2zm5 0a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V2zm5 0a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1V2zM1 7a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V7zm5 0a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7zm5 0a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1V7zM1 12a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1v-2zm5 0a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-2zm5 0a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-2z"/>
          </svg>
          <span>Dashboard</span>
        </a>

        <a th:href="@{/settings}" class="btn btn-ghost btn-sm">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
            <path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/>
          </svg>
          <span>Settings</span>
        </a>

        <form th:action="@{/logout}" method="post" style="margin:0;">
          <button type="submit" class="btn btn-ghost btn-sm" style="color:var(--danger);">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
              <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/>
              <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/>
            </svg>
            <span>Sign out</span>
          </button>
        </form>
      </div>

    </div>
  </div>
</nav>
</body>
</html>
