<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Fewster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/fewster.css}">
</head>
<body>

<div th:replace="~{fragments/header-frag :: header}"></div>

<main class="auth-page">
  <div class="container-sm">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-mark">
          <svg width="20" height="20" viewBox="0 0 18 18" fill="none">
            <path d="M7.5 10.5a3.75 3.75 0 0 0 5.303.053l2.25-2.25a3.75 3.75 0 0 0-5.303-5.303L8.5 4.25" stroke="#388bfd" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10.5 7.5a3.75 3.75 0 0 0-5.303-.053l-2.25 2.25a3.75 3.75 0 0 0 5.303 5.303L9.5 13.75" stroke="#388bfd" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Fewster
<!--          <span class="dot" style="color:var(&#45;&#45;accent-hover);">.</span>-->
        </div>
      </div>

      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-subheading">Sign in to manage your short links</p>

      <!-- Flash messages -->
      <div th:if="${param.error}" class="alert alert-danger mb-2" role="alert">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" style="flex-shrink:0"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/></svg>
        Invalid username or password. Please try again.
      </div>

      <div th:if="${param.logout}" class="alert alert-success mb-2" role="alert">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" style="flex-shrink:0"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>
        You've been signed out successfully.
      </div>

      <div th:if="${success}" class="alert alert-success mb-2" role="alert">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" style="flex-shrink:0"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>
        <span th:text="${success}">Success</span>
      </div>

      <!-- Login form -->
      <form th:action="@{/login}" method="post">

        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input type="text"
                 id="username"
                 name="username"
                 class="form-control"
                 placeholder="your_username"
                 autocomplete="username"
                 autofocus
                 required>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div style="position:relative;">
            <input type="password"
                   id="password"
                   name="password"
                   class="form-control"
                   placeholder="••••••••"
                   autocomplete="current-password"
                   required
                   style="padding-right:2.5rem;">
            <button type="button"
                    onclick="togglePwd('password', this)"
                    style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:.2rem;"
                    title="Show/hide password">
              <svg id="pwd-eye" width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
              </svg>
            </button>
          </div>
        </div>

        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1.25rem;">
          <input type="checkbox" id="remember-me" name="remember-me"
                 style="accent-color:var(--accent);width:14px;height:14px;cursor:pointer;">
          <label for="remember-me" style="font-size:.85rem;color:var(--text-secondary);cursor:pointer;">
            Remember me
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-lg">
          Sign in to Fewster
        </button>

      </form>

      <div class="auth-divider"><span>New here?</span></div>

      <div class="auth-footer">
        Don't have an account?
        <a th:href="@{/register}" style="font-weight:500;">Create one — it's free</a>
      </div>

    </div>
  </div>
</main>

<div th:replace="~{fragments/footer-frag :: footer}"></div>

<script>
function togglePwd(fieldId, btn) {
  const input = document.getElementById(fieldId);
  const showing = input.type === 'text';
  input.type = showing ? 'password' : 'text';
  btn.style.color = showing ? 'var(--text-muted)' : 'var(--accent-hover)';
}
</script>
</body>
</html>
