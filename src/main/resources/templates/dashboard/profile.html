<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Fewster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/fewster.css}">
</head>
<body>

<div th:replace="~{fragments/header-frag :: header}"></div>

<main>
  <div class="container" style="padding-top:2rem;padding-bottom:3rem;">

    <!-- Page header -->
    <div class="page-header">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div>
          <h1 class="page-title">Dashboard</h1>
          <p class="page-subtitle">
            Signed in as <strong sec:authentication="name">user</strong>
          </p>
        </div>
      </div>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success mb-3" role="alert">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" style="flex-shrink:0"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>
      <span th:text="${success}">Success</span>
    </div>
    <div th:if="${error}" class="alert alert-danger mb-3" role="alert">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" style="flex-shrink:0"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/></svg>
      <span th:text="${error}">Error</span>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-label">Total links</span>
        <span class="stat-value" th:text="${totalUrls}">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Total clicks</span>
        <span class="stat-value" th:text="${totalClicks}">0</span>
      </div>
    </div>

    <!-- Create URL card -->
    <div class="card mb-3">
      <div class="card-header">
        <span class="card-title">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
          </svg>
          New short link
        </span>
      </div>
      <div class="card-body">
        <form th:action="@{/dashboard/create}" method="post" th:object="${urlDTO}">
          <div style="display:flex;gap:.75rem;align-items:flex-start;flex-wrap:wrap;">
            <div style="flex:1;min-width:220px;">
              <input type="url"
                     class="form-control"
                     th:classappend="${#fields.hasErrors('originalUrl')} ? 'is-invalid'"
                     th:field="*{originalUrl}"
                     placeholder="https://paste-your-long-url-here.com"
                     autocomplete="off">
              <div th:if="${#fields.hasErrors('originalUrl')}" class="field-error mt-1"
                   th:errors="*{originalUrl}">URL error</div>
            </div>
            <button type="submit" class="btn btn-primary">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5zM11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H2.506a.58.58 0 0 0-.01 0H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1h-.995a.59.59 0 0 0-.01 0H11z"/></svg>
              Shorten
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- URLs table -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
            <path d="M7.5 10.5a3.75 3.75 0 0 0 5.197.054l.106-.107 2.25-2.25a3.75 3.75 0 0 0-5.303-5.303l-1.25 1.25a.5.5 0 0 0 .707.708l1.25-1.25a2.75 2.75 0 0 1 3.89 3.889l-2.25 2.25a2.75 2.75 0 0 1-3.943-.051.5.5 0 0 0-.707.707z"/>
            <path d="M8.5 5.5a3.75 3.75 0 0 0-5.196-.054l-.107.107-2.25 2.25a3.75 3.75 0 0 0 5.303 5.303l1.25-1.25a.5.5 0 1 0-.707-.708l-1.25 1.25a2.75 2.75 0 0 1-3.89-3.889l2.25-2.25a2.75 2.75 0 0 1 3.942.051.5.5 0 0 0 .707-.707z"/>
          </svg>
          Your links
        </span>
        <span class="badge badge-gray" th:text="${totalUrls} + ' links'">0 links</span>
      </div>

      <!-- Empty state -->
      <div th:if="${#lists.isEmpty(urls)}" class="card-body text-center" style="padding:3rem 1.5rem;">
        <div style="font-size:2.5rem;margin-bottom:1rem;opacity:.3;">🔗</div>
        <p style="color:var(--text-secondary);margin-bottom:1rem;">No short links yet.</p>
        <p style="font-size:.85rem;color:var(--text-muted);">Use the form above to create your first one.</p>
      </div>

      <!-- Table -->
      <div th:if="${not #lists.isEmpty(urls)}" class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Original URL</th>
              <th>Short link</th>
              <th>Clicks</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <th:block th:each="url : ${urls}">

              <!-- Main row -->
              <tr th:id="'row-' + ${url.id}">
                <td>
                  <span class="url-original" th:title="${url.originalUrl}" th:text="${url.originalUrl}">
                    https://example.com/very/long/path
                  </span>
                </td>
                <td>
                  <div class="url-short">

                    <a th:href="${url.shortUrl}"
                       target="_blank"
                       rel="noopener noreferrer"
                       th:text="${url.shortCode}"
                       style="color:var(--accent-hover);">
                      abc123
                    </a>

                    <button class="copy-btn"
                            th:data-url="${url.shortUrl}"
                            onclick="copyShort(this.dataset.url, this)"
                            title="Copy short URL">

                      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/>
                        <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3z"/>
                      </svg>

                    </button>

                  </div>
                </td>
                <td>
                  <span class="click-count" th:text="${url.clickCount}">0</span>
                </td>
                <td>
                  <span class="date-cell"
                        th:text="${#temporals.format(url.createdAt, 'dd MMM yyyy')}">
                    01 Jan 2025
                  </span>
                </td>
                <td>
                  <div class="actions-cell">
                    <button class="btn btn-ghost btn-sm"
                            th:onclick="|toggleEdit(${url.id})|"
                            title="Edit">
                      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/></svg>
                      Edit
                    </button>
                    <form th:action="@{/dashboard/delete/{id}(id=${url.id})}" method="post"
                          onsubmit="return confirm('Delete this short link?')">
                      <button type="submit" class="btn btn-danger btn-sm" title="Delete">
                        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
                        Delete
                      </button>
                    </form>
                  </div>
                </td>
              </tr>

              <!-- Inline edit row -->
              <tr th:id="'edit-' + ${url.id}" class="edit-row">
                <td colspan="5">
                  <form th:action="@{/dashboard/update/{id}(id=${url.id})}" method="post">
                    <div class="edit-form-inner">
                      <input type="url"
                             name="newOriginalUrl"
                             class="form-control"
                             th:value="${url.originalUrl}"
                             placeholder="New URL"
                             required>
                      <button type="submit" class="btn btn-success btn-sm">Save</button>
                      <button type="button" class="btn btn-ghost btn-sm"
                              th:onclick="|toggleEdit(${url.id})|">Cancel</button>
                    </div>
                  </form>
                </td>
              </tr>

            </th:block>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<div th:replace="~{fragments/footer-frag :: footer}"></div>

<script>
function toggleEdit(id) {
  const editRow = document.getElementById('edit-' + id);
  editRow.classList.toggle('active');
  if (editRow.classList.contains('active')) {
    editRow.querySelector('input').focus();
  }
}

function copyShort(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.classList.add('copied');
    const orig = btn.innerHTML;
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/></svg>';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = orig;
    }, 1800);
  });
}
</script>
</body>
</html>
